packages:
  - apps/*
  - packages/*
  - tools/*
allowBuilds:
  "@parcel/watcher": false
  esbuild: false
  msgpackr-extract: false

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
