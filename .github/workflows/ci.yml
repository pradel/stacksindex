name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: vite-plus setup
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"

      - name: Check formatting and linting
        run: vp check

      - name: Run tests
        run: vp test
